<rect x="0" y="360" width="680" height="1" fill="#ff6eb4" opacity="0.6"/>

<rect x="60" y="86" width="560" height="214" fill="#0a0a16" stroke="#00f5ff" stroke-width="3"/>
<rect x="60" y="86" width="560" height="214" fill="url(#scan)"/>
<rect x="66" y="92" width="548" height="202" fill="none" stroke="#0096a6" stroke-width="1"/>

