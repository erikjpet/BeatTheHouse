<svg width="680" height="400" viewBox="0 0 680 400" role="img" xmlns="http://www.w3.org/2000/svg">
<title>Beat the House logo</title>
<desc>A neon arcade marquee logo in the game's own style: a cyan cabinet frame on near-black with three reel windows showing the game's actual slot symbols — a lucky seven tile, a BAR tile, and a gold token coin — under the pixel wordmark BEAT THE HOUSE.</desc>
<defs>
<style>@import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&amp;display=swap');</style>
<pattern id="scan" width="4" height="4" patternUnits="userSpaceOnUse">
<rect width="4" height="2" fill="#0d1426" opacity="0.55"/>
</pattern>
</defs>

