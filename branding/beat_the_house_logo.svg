<rect x="492" y="83" width="5" height="6"/><rect x="532" y="83" width="5" height="6"/>
<rect x="572" y="83" width="5" height="6"/>
</g>

<rect x="190" y="100" width="84" height="62" fill="#05060a" stroke="#ffffff" stroke-width="2"/>
<rect x="195" y="105" width="74" height="52" fill="#ff2d78" opacity="0.16"/>
